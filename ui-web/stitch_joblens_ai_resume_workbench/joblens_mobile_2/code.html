<!DOCTYPE html>

<html class="light" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>JobLens - 输入</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        @font-face {
            font-family: 'PingFang SC';
            src: local('PingFang SC');
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-fixed": "#e2e2e2",
                        "on-secondary-container": "#63646c",
                        "error-container": "#ffdad6",
                        "on-primary-fixed": "#1c1b1b",
                        "secondary-container": "#e3e1ec",
                        "tertiary-fixed-dim": "#c6c6c7",
                        "on-secondary": "#ffffff",
                        "surface-container-low": "#f3f3f6",
                        "surface-container-lowest": "#ffffff",
                        "on-primary-fixed-variant": "#474646",
                        "background": "#f9f9fc",
                        "on-surface-variant": "#444748",
                        "primary": "#000000",
                        "on-background": "#1a1c1e",
                        "surface-dim": "#dadadd",
                        "inverse-surface": "#2f3033",
                        "on-tertiary": "#ffffff",
                        "on-tertiary-container": "#838484",
                        "primary-fixed": "#e5e2e1",
                        "on-error": "#ffffff",
                        "surface": "#f9f9fc",
                        "secondary-fixed": "#e3e1ec",
                        "surface-container": "#eeedf0",
                        "secondary-fixed-dim": "#c6c5cf",
                        "on-primary": "#ffffff",
                        "surface-container-high": "#e8e8eb",
                        "surface-variant": "#e2e2e5",
                        "surface-bright": "#f9f9fc",
                        "on-surface": "#1a1c1e",
                        "tertiary-container": "#1a1c1c",
                        "on-secondary-fixed": "#1a1b22",
                        "secondary": "#5d5e66",
                        "on-tertiary-fixed-variant": "#454747",
                        "on-primary-container": "#858383",
                        "error": "#ba1a1a",
                        "outline": "#747878",
                        "inverse-primary": "#c9c6c5",
                        "surface-tint": "#5f5e5e",
                        "surface-container-highest": "#e2e2e5",
                        "inverse-on-surface": "#f0f0f3",
                        "tertiary": "#000000",
                        "primary-fixed-dim": "#c9c6c5",
                        "on-tertiary-fixed": "#1a1c1c",
                        "on-secondary-fixed-variant": "#46464e",
                        "outline-variant": "#c4c7c7",
                        "on-error-container": "#93000a",
                        "primary-container": "#1c1b1b"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "container-max": "1200px",
                        "margin-desktop": "48px",
                        "gutter": "24px",
                        "base": "4px",
                        "margin-mobile": "16px",
                        "stack-lg": "32px",
                        "stack-sm": "8px",
                        "stack-md": "16px"
                    },
                    "fontFamily": {
                        "label-sm": ["Inter", "PingFang SC"],
                        "body-md": ["Inter", "PingFang SC"],
                        "headline-md": ["Inter", "PingFang SC"],
                        "title-lg": ["Inter", "PingFang SC"],
                        "label-md": ["Inter", "PingFang SC"],
                        "headline-lg": ["Inter", "PingFang SC"],
                        "body-lg": ["Inter", "PingFang SC"],
                        "headline-lg-mobile": ["Inter", "PingFang SC"],
                        "display": ["Inter", "PingFang SC"]
                    },
                    "fontSize": {
                        "label-sm": ["11px", { "lineHeight": "14px", "letterSpacing": "0.02em", "fontWeight": "500" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "headline-md": ["20px", { "lineHeight": "28px", "letterSpacing": "-0.015em", "fontWeight": "600" }],
                        "title-lg": ["18px", { "lineHeight": "26px", "fontWeight": "500" }],
                        "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.01em", "fontWeight": "500" }],
                        "headline-lg": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.015em", "fontWeight": "600" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-lg-mobile": ["22px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "display": ["36px", { "lineHeight": "44px", "letterSpacing": "-0.02em", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body-md min-h-screen pb-24 md:pb-0">
<!-- Top Navigation Area (Mobile Optimized) -->
<header class="sticky top-0 w-full z-50 flex justify-between items-center px-margin-mobile h-16 bg-surface border-b border-outline-variant">
<div class="font-headline-md text-headline-md font-bold text-primary">JobLens</div>
<button class="text-secondary cursor-pointer">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">account_circle</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="w-full px-margin-mobile py-stack-md flex flex-col gap-stack-lg">
<!-- Job Description Input -->
<section class="flex flex-col gap-stack-sm">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-[20px]" style="font-variation-settings: 'FILL' 1;">work</span>
<h2 class="font-title-lg text-title-lg text-primary">职位描述</h2>
</div>
<div class="bg-surface-container-lowest border border-outline-variant rounded-lg p-3">
<textarea class="w-full h-40 bg-transparent border-none focus:ring-0 p-0 resize-none font-body-md text-body-md text-on-surface placeholder-on-surface-variant/50" placeholder="粘贴完整的职位描述 (JD)..."></textarea>
</div>
</section>
<!-- Resume Upload -->
<section class="flex flex-col gap-stack-sm">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-[20px]" style="font-variation-settings: 'FILL' 1;">description</span>
<h2 class="font-title-lg text-title-lg text-primary">你的简历</h2>
</div>
<div class="bg-surface-container-lowest border border-outline-variant border-dashed rounded-lg h-32 flex flex-col items-center justify-center gap-2 cursor-pointer hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined text-secondary text-[24px]" style="font-variation-settings: 'FILL' 0;">upload_file</span>
<span class="font-label-md text-label-md text-secondary">点击上传或拖拽文件至此</span>
<span class="font-label-sm text-label-sm text-on-surface-variant opacity-70">支持 PDF, DOCX (最大 5MB)</span>
</div>
<!-- Paste alternative -->
<div class="mt-2">
<div class="flex items-center gap-2 text-on-surface-variant">
<div class="h-[1px] flex-1 bg-outline-variant"></div>
<span class="font-label-sm text-label-sm">或</span>
<div class="h-[1px] flex-1 bg-outline-variant"></div>
</div>
<div class="mt-2 bg-surface-container-lowest border border-outline-variant rounded-lg p-3">
<textarea class="w-full h-24 bg-transparent border-none focus:ring-0 p-0 resize-none font-body-md text-body-md text-on-surface placeholder-on-surface-variant/50" placeholder="直接粘贴简历文本..."></textarea>
</div>
</div>
</section>
<!-- Analysis Settings (Collapsible pattern) -->
<section class="border border-outline-variant rounded-lg bg-surface-container-lowest overflow-hidden">
<div class="flex justify-between items-center p-4 cursor-pointer" onclick="document.getElementById('advanced-settings').classList.toggle('hidden')">
<span class="font-body-md text-body-md text-on-surface font-medium">高级设置</span>
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 0;">expand_more</span>
</div>
<div class="hidden p-4 pt-0 border-t border-outline-variant flex flex-col gap-3" id="advanced-settings">
<label class="flex items-center gap-3 cursor-pointer">
<div class="relative flex items-center">
<input class="peer h-4 w-4 border-1.5 border-outline rounded-[2px] bg-surface-container-lowest checked:bg-primary checked:border-primary focus:ring-0 focus:ring-offset-0 transition-colors" type="checkbox"/>
<span class="material-symbols-outlined absolute text-on-primary text-[14px] pointer-events-none opacity-0 peer-checked:opacity-100 left-[1px]" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
<span class="font-body-md text-body-md text-on-surface">重点关注关键词匹配率</span>
</label>
<label class="flex items-center gap-3 cursor-pointer">
<div class="relative flex items-center">
<input checked="" class="peer h-4 w-4 border-1.5 border-outline rounded-[2px] bg-surface-container-lowest checked:bg-primary checked:border-primary focus:ring-0 focus:ring-offset-0 transition-colors" type="checkbox"/>
<span class="material-symbols-outlined absolute text-on-primary text-[14px] pointer-events-none opacity-0 peer-checked:opacity-100 left-[1px]" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
<span class="font-body-md text-body-md text-on-surface">生成 STAR 法则建议</span>
</label>
</div>
</section>
<!-- Mobile Action Area -->
<div class="mt-4 mb-8">
<button class="w-full bg-primary text-on-primary h-12 rounded-lg font-headline-md text-headline-md flex items-center justify-center gap-2 active:opacity-80 transition-opacity">
<span>开始分析</span>
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 0;">arrow_forward</span>
</button>
</div>
</main>
<!-- Bottom Navigation Shell (Mobile Only) -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-margin-mobile md:hidden bg-surface border-t border-outline-variant h-24">
<div class="flex flex-col items-center justify-center bg-primary dark:bg-primary-fixed text-on-primary dark:text-on-primary-fixed rounded-lg px-4 py-1 scale-95 transition-transform duration-150">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">edit_document</span>
<span class="font-label-sm text-label-sm mt-1">输入</span>
</div>
<div class="flex flex-col items-center justify-center text-secondary dark:text-on-secondary-container px-4 py-1 hover:bg-surface-container-high dark:hover:bg-on-primary-fixed-variant scale-95 transition-transform duration-150 cursor-pointer">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">psychology</span>
<span class="font-label-sm text-label-sm mt-1">分析</span>
</div>
<div class="flex flex-col items-center justify-center text-secondary dark:text-on-secondary-container px-4 py-1 hover:bg-surface-container-high dark:hover:bg-on-primary-fixed-variant scale-95 transition-transform duration-150 cursor-pointer">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">task_alt</span>
<span class="font-label-sm text-label-sm mt-1">结果</span>
</div>
</nav>
</body></html>
